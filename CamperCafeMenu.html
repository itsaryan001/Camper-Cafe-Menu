<!-- Practice Project 2 of Free Code Camp -->

<!DOCTYPE html>

<html lang="en">

<head>
    <title> Cafe Menu </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Basic CSS -->
    <style>
        h1, h2, p {
            text-align: center;
        }

        h1, h2 {
            font-family: Impact, serif;
        }

        h1 {
            font-size: 40px;
            margin-top: 0px;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 30px;
        }

        .established {
            font-style: italic;
        }

        img {
            display: block;
            margin-right: auto;
            margin-left: auto;
            margin-top: -25px;
        }

        body {
            background-image: url(https://cdn.freecodecamp.org/curriculum/css-cafe/beans.jpg);
            font-family: sans-serif
            padding: 20px;
        }

        .menu {
            width: 80%;
            max-width: 500px;
            background-color: burlywood;
            margin-right: auto;
            margin-left: auto;
            padding: 20px;

        }

        hr {
            height: 2px;
            background-color: brown;
            border-color: brown;
            border-width: 1px;
        }

        .flavor, .dessert {
            text-align: left;
            width: 75%;
        }

        .price {
            text-align: right;
            width: 25%;
        }

        .item p {
            display: inline-block;
            margin-top: 5px;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .bottom-line {
            margin-top: 25px;
        }

        /* FOOTER */

        footer {
            font-size: 14px;
        }

        a {
            color: black;
        }

        a:visited{
            color: black;
        }

        a:hover {
        color: brown;
        }

        a:active {
        color: brown;
        }

        .address {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div class="menu">
        <header>
            <h1>CAMPER CAFE</h1>
            <p class="established">Est. 2020</p>
        </header>

        <hr>

        <main>
            <!-- Section 1 -->
            <section>
                <h2>Coffee</h2>

                <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffee icon">

                <article class="item">
                    <p class="flavor">French Vanilla</p><p class="price">3.00</p>
                </article>

                <article class="item">
                    <p class="flavor"> Caramel Macchiato </p><p class="price"> 3.75 </p>
                </article>

                <article class="item">
                    <p class="flavor"> Pumpkin Spice </p><p class="price"> 3.50 </p>
                </article>

                <article class="item">
                    <p class="flavor"> Hazelnut </p><p class="price"> 4.00 </p>
                </article>

                <article class="item">
                    <p class="flavor"> Mocha </p><p class="price"> 4.50 </p>
                </article>

            </section>

            <!-- Section 2 -->
            <section>
                <h2>Desserts</h2>

                <img src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="pie icon">

                <article class="item">
                    <p class="dessert">Donut</p><p class="price">1.50</p>
                </article>

                <article class="item">
                    <p class="dessert">Cherry Pie</p><p class="price"> 2.75</p>
                </article>

                <article class="item">
                    <p class="dessert">Cheesecake</p><p class="price"> 3.00</p>
                </article>

                <article class="item">
                    <p class="dessert">Cinnamon Roll</p><p class="price"> 2.50</p>
                </article>
            </section>
        </main>

        <hr class="bottom-line">

        <footer>
            <p><a target="_blank" href="https://instagr.am/teenprogrammer.py/">Visit Our Instagram</a>.</p>
            <p class="address"> 123 Free Code Camp Drive </p>
        </footer>
    </div>

</body>

</html>
